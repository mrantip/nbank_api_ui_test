version: '3'
services:
  backend:
    image: nobugsme/nbank:latest
    ports:
      - "4111:4111"
    networks:
      - app-network

  frontend:
    build: ./NBank-UI  # если есть Dockerfile
    ports:
      - "3000:3000"
    networks:
      - app-network

  selenoid:
    image: aerokube/selenoid:latest-release
    ports:
      - "4444:4444"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge